name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Node.js: Typecheck ───────────────────────────────────────────────────
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm run typecheck

  # ─── Python: Lint ─────────────────────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Lint Flask server
        run: |
          flake8 artifacts/cattle-predict/server.py \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Lint training script
        run: |
          flake8 scripts/src/train.py \
            --max-line-length=120 \
            --ignore=E501,W503

  # ─── API Spec: Codegen validation ────────────────────────────────────────
  codegen:
    name: OpenAPI Codegen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Check for uncommitted codegen changes
        run: |
          if [ -n "$(git status --porcelain lib/api-spec/)" ]; then
            echo "❌ Generated API files are out of date."
            echo "Run: pnpm --filter @workspace/api-spec run codegen"
            git diff lib/api-spec/
            exit 1
          else
            echo "✅ Generated API files are up to date."
          fi
